<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Tool Comparison - AI 工具对比</title>
<link rel="canonical" href="https://aicompare.jtlcook.com">
<link rel="alternate" hreflang="zh" href="https://aicompare.jtlcook.com/zh/">
<link rel="alternate" hreflang="en" href="https://aicompare.jtlcook.com/en/">
<link rel="alternate" hreflang="x-default" href="https://aicompare.jtlcook.com/zh/">
<meta name="robots" content="noindex">
<script>
(function() {
  var lang = navigator.language || navigator.userLanguage || '';
  var stored = localStorage.getItem('preferred-lang');
  if (stored) {
    window.location.replace('/' + stored + '/index.html');
    return;
  }
  if (lang.startsWith('zh')) {
    window.location.replace('/zh/index.html');
  } else {
    window.location.replace('/en/index.html');
  }
})();
</script>
<noscript>
<meta http-equiv="refresh" content="0;url=/zh/index.html">
</noscript>
</head>
<body>
<p>Redirecting... <a href="/zh/index.html">中文</a> | <a href="/en/index.html">English</a></p>
</body>
</html>
